<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CALC</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --border: #222;
      --accent: #00ff88;
      --accent2: #ff3366;
      --text: #e8e8e8;
      --muted: #555;
      --btn-bg: #1a1a1a;
      --btn-hover: #242424;
      --btn-active: #2a2a2a;
    }

    body {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,255,136,0.015) 40px, rgba(0,255,136,0.015) 41px);
      pointer-events: none;
    }

    .calculator {
      width: 340px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(0,255,136,0.08), 0 0 120px rgba(0,255,136,0.04), inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
      position: relative;
    }

    .calculator::before {
      content: 'CALC v2.1';
      position: absolute;
      top: 12px;
      left: 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--muted);
    }

    .calculator::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .display-area {
      padding: 40px 20px 20px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      min-height: 120px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      gap: 6px;
      position: relative;
    }

    .history {
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }

    .expression {
      font-size: 14px;
      color: #888;
      min-height: 20px;
      letter-spacing: 1px;
      word-break: break-all;
      text-align: right;
    }

    .main-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      color: var(--accent);
      letter-spacing: 2px;
      line-height: 1;
      text-shadow: 0 0 20px rgba(0,255,136,0.4);
      word-break: break-all;
      text-align: right;
      transition: all 0.1s;
    }

    .main-display.error {
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(255,51,102,0.4);
      font-size: 28px;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      padding: 1px;
    }

    button {
      background: var(--btn-bg);
      border: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      padding: 18px 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.1s, color 0.1s, transform 0.05s;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,255,136,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button:hover { background: var(--btn-hover); }
    button:hover::after { opacity: 1; }
    button:active { background: var(--btn-active); transform: scale(0.96); }

    .btn-op {
      color: var(--accent);
    }

    .btn-clear {
      color: var(--accent2);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      font-size: 14px;
    }

    .btn-equals {
      background: var(--accent);
      color: #000;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 2px;
      font-size: 22px;
      font-weight: bold;
    }

    .btn-equals:hover { background: #00e87a; }
    .btn-equals::after { background: radial-gradient(circle at center, rgba(255,255,255,0.2) 0%, transparent 70%); }

    .btn-zero { grid-column: span 2; }

    .btn-special {
      color: #aaa;
      font-size: 13px;
    }

    .pressed {
      animation: press 0.1s ease;
    }

    @keyframes press {
      0% { transform: scale(1); }
      50% { transform: scale(0.94); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="calculator" id="calc">
    <div class="display-area">
      <div class="history" id="history"></div>
      <div class="expression" id="expression"></div>
      <div class="main-display" id="display">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percentage()">%</button>
      <button class="btn-op" onclick="setOp('/')">÷</button>

      <button onclick="input('7')">7</button>
      <button onclick="input('8')">8</button>
      <button onclick="input('9')">9</button>
      <button class="btn-op" onclick="setOp('*')">×</button>

      <button onclick="input('4')">4</button>
      <button onclick="input('5')">5</button>
      <button onclick="input('6')">6</button>
      <button class="btn-op" onclick="setOp('-')">−</button>

      <button onclick="input('1')">1</button>
      <button onclick="input('2')">2</button>
      <button onclick="input('3')">3</button>
      <button class="btn-op" onclick="setOp('+')">+</button>

      <button class="btn-zero" onclick="input('0')">0</button>
      <button onclick="inputDot()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let justCalc = false;
    let expression = '';

    const display = document.getElementById('display');
    const exprEl = document.getElementById('expression');
    const histEl = document.getElementById('history');

    function updateDisplay(val) {
      display.classList.remove('error');
      let s = String(val);
      if (s.length > 10) {
        let n = parseFloat(val);
        s = n.toPrecision(8).replace(/\.?0+$/, '');
        if (s.length > 12) s = n.toExponential(4);
      }
      display.textContent = s;
    }

    function input(digit) {
      if (justCalc) { current = digit; justCalc = false; expression = ''; }
      else if (current === '0') current = digit;
      else if (current.length < 12) current += digit;
      updateDisplay(current);
    }

    function inputDot() {
      if (justCalc) { current = '0.'; justCalc = false; expression = ''; }
      else if (!current.includes('.')) current += '.';
      updateDisplay(current);
    }

    function setOp(op) {
      if (operator && !justCalc) {
        const res = compute(parseFloat(previous), parseFloat(current), operator);
        previous = String(res);
        updateDisplay(res);
      } else {
        previous = current;
      }
      operator = op;
      justCalc = false;
      current = '0';                           // ← reset so next digits start fresh
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      expression = previous + ' ' + opSymbols[op];
      exprEl.textContent = expression;
    }

    function compute(a, b, op) {
      switch(op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b === 0 ? 'ERR: DIV/0' : a / b;
      }
    }

    function calculate() {
      if (!operator || previous === null) return;
      const a = parseFloat(previous);
      const b = parseFloat(current);
      const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      const fullExpr = previous + ' ' + opSymbols[operator] + ' ' + current;
      const result = compute(a, b, operator);
      if (typeof result === 'string') {
        display.classList.add('error');
        display.textContent = result;
        histEl.textContent = '';
        exprEl.textContent = '';
      } else {
        histEl.textContent = fullExpr + ' =';
        exprEl.textContent = '';
        current = String(result);
        updateDisplay(result);
      }
      operator = null;
      previous = null;
      justCalc = true;
    }

    function clearAll() {
      current = '0'; previous = null; operator = null; justCalc = false; expression = '';
      display.classList.remove('error');
      display.textContent = '0';
      exprEl.textContent = '';
      histEl.textContent = '';
    }

    function toggleSign() {
      current = String(parseFloat(current) * -1);
      updateDisplay(current);
    }

    function percentage() {
      current = String(parseFloat(current) / 100);
      updateDisplay(current);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') input(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') setOp('+');
      else if (e.key === '-') setOp('-');
      else if (e.key === '*') setOp('*');
      else if (e.key === '/') { e.preventDefault(); setOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (current.length > 1) current = current.slice(0, -1);
        else current = '0';
        updateDisplay(current);
      }
    });
  </script>
</body>
</html>
